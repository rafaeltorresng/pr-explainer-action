name: 'PR Explainer AI'
description: 'Generate an interactive HTML explanation and quiz for pull requests with OpenRouter models.'
author: 'Rafael Torres'
branding:
  icon: 'book-open'
  color: 'blue'

inputs:
  openrouter_api_key:
    description: 'OpenRouter API key used to call the LLM.'
    required: true
  max_lines:
    description: 'Maximum added plus deleted lines allowed before skipping generation.'
    required: false
    default: '15000'
  openrouter_model:
    description: 'OpenRouter model identifier. Users can override it with any model available in OpenRouter.'
    required: false
    default: 'deepseek/deepseek-v4-flash'
  language:
    description: 'Language used for the generated prompt, HTML artifact, and PR comments. Supported values: en, pt-BR.'
    required: false
    default: 'en'
  output_file:
    description: 'Generated HTML filename.'
    required: false
    default: 'pr-explanation.html'
  artifact_name:
    description: 'Artifact name used when uploading the generated HTML.'
    required: false
    default: 'pr-explanation-html'
  base_ref:
    description: 'Base ref used to compute the diff. Optional outside pull_request events.'
    required: false
    default: ''
  comment_on_pr:
    description: 'Whether to post a PR comment with artifact instructions.'
    required: false
    default: 'true'

outputs:
  should_run:
    description: 'Whether generation ran after diff sizing.'
    value: ${{ steps.diff.outputs.should_run }}
  lines_changed:
    description: 'Added plus deleted lines counted from the git diff.'
    value: ${{ steps.diff.outputs.lines_changed }}
  artifact_name:
    description: 'Artifact name used by the upload step.'
    value: ${{ inputs.artifact_name }}

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Generate Git Diff
      id: diff
      shell: bash
      env:
        INPUT_BASE_REF: ${{ inputs.base_ref }}
        GITHUB_BASE_REF: ${{ github.base_ref }}
        INPUT_MAX_LINES: ${{ inputs.max_lines }}
      run: |
        set -euo pipefail

        BASE_REF="${INPUT_BASE_REF:-}"
        if [ -z "$BASE_REF" ]; then
          BASE_REF="${GITHUB_BASE_REF:-}"
        fi
        if [ -z "$BASE_REF" ]; then
          BASE_REF="main"
        fi

        git fetch --no-tags origin "$BASE_REF"
        git diff "origin/$BASE_REF"...HEAD > pr_diff.patch

        LINES_CHANGED="$(git diff --numstat "origin/$BASE_REF"...HEAD | awk '{if ($1 != "-") ins+=$1; if ($2 != "-") del+=$2} END {print ins+del}')"
        if [ -z "$LINES_CHANGED" ]; then
          LINES_CHANGED=0
        fi

        SHOULD_RUN=false
        if [ "$LINES_CHANGED" -lt "$INPUT_MAX_LINES" ]; then
          SHOULD_RUN=true
        fi

        echo "lines_changed=$LINES_CHANGED" >> "$GITHUB_OUTPUT"
        echo "should_run=$SHOULD_RUN" >> "$GITHUB_OUTPUT"

    - name: Generate HTML explanation
      if: steps.diff.outputs.should_run == 'true'
      shell: bash
      env:
        OPENROUTER_API_KEY: ${{ inputs.openrouter_api_key }}
        OPENROUTER_MODEL: ${{ inputs.openrouter_model }}
        EXPLAINER_LANGUAGE: ${{ inputs.language }}
        OUTPUT_FILE: ${{ inputs.output_file }}
      run: |
        set -euo pipefail
        bun "$GITHUB_ACTION_PATH/explain-pr.js" pr_diff.patch "$OUTPUT_FILE"

    - name: Upload HTML artifact
      if: steps.diff.outputs.should_run == 'true'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.artifact_name }}
        path: ${{ inputs.output_file }}
        retention-days: 14

    - name: Comment PR with artifact link
      if: github.event_name == 'pull_request' && inputs.comment_on_pr == 'true' && steps.diff.outputs.should_run == 'true'
      uses: actions/github-script@v9
      with:
        github-token: ${{ github.token }}
        script: |
          const artifactName = '${{ inputs.artifact_name }}';
          const language = '${{ inputs.language }}';
          const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
          const copy = language === 'pt-BR'
            ? {
                title: '### PR Explainer AI',
                generated: 'Explicação interativa gerada para este PR.',
                artifact: `Artefato: \`${artifactName}\``,
                openRun: `[Abrir execução](${runUrl})`
              }
            : {
                title: '### PR Explainer AI',
                generated: 'Interactive explanation generated for this PR.',
                artifact: `Artifact: \`${artifactName}\``,
                openRun: `[Open run](${runUrl})`
              };
          const body = [copy.title, '', copy.generated, '', copy.artifact, copy.openRun].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body,
          });

    - name: Comment PR when skipped
      if: github.event_name == 'pull_request' && inputs.comment_on_pr == 'true' && steps.diff.outputs.should_run == 'false'
      uses: actions/github-script@v9
      with:
        github-token: ${{ github.token }}
        script: |
          const language = '${{ inputs.language }}';
          const linesChanged = '${{ steps.diff.outputs.lines_changed }}';
          const maxLines = '${{ inputs.max_lines }}';
          const body = language === 'pt-BR'
            ? [
                '### PR Explainer AI',
                `Ignorado: ${linesChanged} linhas alteradas excedem o limite ${maxLines}.`
              ].join('\n')
            : [
                '### PR Explainer AI',
                `Skipped: ${linesChanged} changed lines exceeds limit ${maxLines}.`
              ].join('\n');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body,
          });
